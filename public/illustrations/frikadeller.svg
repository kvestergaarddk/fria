<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle hand-drawn roughness filter -->
    <filter id="sketch" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Diagonal hatching (light) -->
    <pattern id="hatch-light" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(42)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#1D2B78" stroke-width="0.85"/>
    </pattern>

    <!-- Cross-hatching (for shadows) -->
    <pattern id="hatch-cross" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(42)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1D2B78" stroke-width="0.85"/>
      <line x1="0" y1="0" x2="6" y2="0" stroke="#1D2B78" stroke-width="0.75"/>
    </pattern>

    <!-- Clip paths for the three meatballs -->
    <clipPath id="clip-mb1"><circle cx="143" cy="240" r="56"/></clipPath>
    <clipPath id="clip-mb2"><circle cx="200" cy="212" r="53"/></clipPath>
    <clipPath id="clip-mb3"><circle cx="257" cy="240" r="56"/></clipPath>

    <!-- Clip for plate area (for subtle plate hatching) -->
    <clipPath id="clip-plate">
      <ellipse cx="200" cy="290" rx="158" ry="30"/>
    </clipPath>
  </defs>

  <!-- Warm cream background -->
  <rect width="400" height="400" fill="#F5EDE0"/>

  <!-- Decorative corner swirls (like reference) -->
  <g opacity="0.35" stroke="#1D2B78" fill="none" stroke-linecap="round">
    <path d="M18,370 Q35,355 55,368 Q75,381 95,365" stroke-width="1.3"/>
    <path d="M340,30 Q355,45 348,62 Q341,79 356,90" stroke-width="1.1"/>
    <circle cx="358" cy="92" r="3.5" fill="#1D2B78" stroke="none"/>
  </g>

  <!-- ─── Main illustration group with sketch filter ─── -->
  <g filter="url(#sketch)">

    <!-- PLATE -->
    <!-- Subtle plate hatching -->
    <rect x="0" y="0" width="400" height="400" fill="url(#hatch-light)" clip-path="url(#clip-plate)" opacity="0.1"/>
    <!-- Plate rim (two ellipses) -->
    <ellipse cx="200" cy="290" rx="158" ry="30" fill="none" stroke="#1D2B78" stroke-width="2.2" stroke-linecap="round"/>
    <ellipse cx="200" cy="287" rx="143" ry="23" fill="none" stroke="#1D2B78" stroke-width="0.9" opacity="0.5"/>

    <!-- ── MEATBALL 1 (left) ── -->
    <!-- Hatching fill (light) -->
    <rect x="0" y="0" width="400" height="400" fill="url(#hatch-light)" clip-path="url(#clip-mb1)" opacity="0.24"/>
    <!-- Shadow cross-hatch (bottom-right) -->
    <rect x="25" y="18" width="400" height="400" fill="url(#hatch-cross)" clip-path="url(#clip-mb1)" opacity="0.16"/>
    <!-- Outline -->
    <circle cx="143" cy="240" r="56" fill="none" stroke="#1D2B78" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Surface texture detail lines -->
    <path d="M117,220 Q131,212 147,219" fill="none" stroke="#1D2B78" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M110,233 Q127,224 144,230" fill="none" stroke="#1D2B78" stroke-width="0.85" stroke-linecap="round"/>
    <path d="M118,247 Q133,241 148,245" fill="none" stroke="#1D2B78" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/>
    <path d="M128,258 Q140,254 152,257" fill="none" stroke="#1D2B78" stroke-width="0.65" stroke-linecap="round" opacity="0.5"/>

    <!-- ── MEATBALL 2 (center, slightly back) ── -->
    <rect x="0" y="0" width="400" height="400" fill="url(#hatch-light)" clip-path="url(#clip-mb2)" opacity="0.22"/>
    <rect x="22" y="16" width="400" height="400" fill="url(#hatch-cross)" clip-path="url(#clip-mb2)" opacity="0.14"/>
    <circle cx="200" cy="212" r="53" fill="none" stroke="#1D2B78" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M175,193 Q190,185 205,192" fill="none" stroke="#1D2B78" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M168,206 Q186,197 203,203" fill="none" stroke="#1D2B78" stroke-width="0.85" stroke-linecap="round"/>
    <path d="M175,219 Q191,213 207,217" fill="none" stroke="#1D2B78" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/>
    <path d="M184,230 Q198,226 211,229" fill="none" stroke="#1D2B78" stroke-width="0.65" stroke-linecap="round" opacity="0.5"/>

    <!-- ── MEATBALL 3 (right) ── -->
    <rect x="0" y="0" width="400" height="400" fill="url(#hatch-light)" clip-path="url(#clip-mb3)" opacity="0.24"/>
    <rect x="25" y="18" width="400" height="400" fill="url(#hatch-cross)" clip-path="url(#clip-mb3)" opacity="0.16"/>
    <circle cx="257" cy="240" r="56" fill="none" stroke="#1D2B78" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M231,220 Q245,212 261,219" fill="none" stroke="#1D2B78" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M224,233 Q242,224 258,230" fill="none" stroke="#1D2B78" stroke-width="0.85" stroke-linecap="round"/>
    <path d="M232,247 Q247,241 262,245" fill="none" stroke="#1D2B78" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/>
    <path d="M242,258 Q254,254 266,257" fill="none" stroke="#1D2B78" stroke-width="0.65" stroke-linecap="round" opacity="0.5"/>

    <!-- ── PARSLEY garnish ── -->
    <g stroke="#1D2B78" fill="none" stroke-linecap="round">
      <!-- Leaves -->
      <ellipse cx="174" cy="283" rx="9" ry="5.5" stroke-width="1.4" transform="rotate(-25 174 283)"/>
      <line x1="174" y1="286" x2="173" y2="294" stroke-width="1.1"/>
      <ellipse cx="189" cy="286" rx="9" ry="5.5" stroke-width="1.4" transform="rotate(8 189 286)"/>
      <line x1="189" y1="289" x2="189" y2="297" stroke-width="1.1"/>
      <ellipse cx="201" cy="284" rx="9" ry="5.5" stroke-width="1.4" transform="rotate(-10 201 284)"/>
      <line x1="201" y1="287" x2="200" y2="295" stroke-width="1.1"/>
      <ellipse cx="214" cy="286" rx="9" ry="5.5" stroke-width="1.4" transform="rotate(18 214 286)"/>
      <line x1="214" y1="289" x2="215" y2="297" stroke-width="1.1"/>
      <ellipse cx="228" cy="283" rx="9" ry="5.5" stroke-width="1.4" transform="rotate(-8 228 283)"/>
      <line x1="228" y1="286" x2="229" y2="294" stroke-width="1.1"/>
      <!-- Centre vein lines on leaves -->
      <line x1="168" y1="282" x2="180" y2="283" stroke-width="0.6" opacity="0.6"/>
      <line x1="196" y1="283" x2="207" y2="283" stroke-width="0.6" opacity="0.6"/>
      <line x1="222" y1="282" x2="234" y2="282" stroke-width="0.6" opacity="0.6"/>
    </g>

    <!-- ── STEAM ── -->
    <g stroke="#1D2B78" fill="none" stroke-linecap="round" opacity="0.5">
      <path d="M158,152 Q149,138 158,124 Q167,110 158,96 Q149,82 158,70" stroke-width="1.6"/>
      <path d="M200,147 Q191,133 200,119 Q209,105 200,91 Q191,77 200,65" stroke-width="1.6"/>
      <path d="M242,152 Q233,138 242,124 Q251,110 242,96 Q233,82 242,70" stroke-width="1.6"/>
    </g>

  </g>

  <!-- ── Label in terracotta (crisp, outside filter) ── -->
  <text
    x="38" y="368"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23"
    fill="#C4543A"
    font-style="italic"
    transform="rotate(-5 38 368)"
  >frikadeller</text>
</svg>
